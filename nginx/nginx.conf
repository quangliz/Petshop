# 1. Chuyển hướng toàn bộ traffic HTTP -> HTTPS
server {
    listen 80;
    server_name thepawsome.store www.thepawsome.store;

    # Trả về 301 chuyển hướng toàn bộ sang HTTPS
    return 301 https://thepawsome.store$request_uri;
}

# 2. Xử lý SSL cho domain www -> Redirect sang non-www (thepawsome.store)
server {
    listen 443 ssl http2;
    server_name www.thepawsome.store;

    # Trỏ đến chứng chỉ SSL của ông
    ssl_certificate /etc/letsencrypt/live/thepawsome.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thepawsome.store/privkey.pem;

    # Ép chuyển hướng vĩnh viễn (301)
    return 301 https://thepawsome.store$request_uri;
}

# 3. Server xử lý chính (Không www, HTTPS)
server {
    listen 443 ssl http2;
    server_name thepawsome.store;

    # Trỏ đến chứng chỉ SSL của ông
    ssl_certificate /etc/letsencrypt/live/thepawsome.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thepawsome.store/privkey.pem;

    # Cấu hình bảo mật SSL cơ bản (nên có)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Backend API (Giữ nguyên logic proxy của ông)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / streaming support (chat endpoint)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}