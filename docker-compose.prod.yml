services:
  redis:
    image: redis:7-alpine
    container_name: petshop_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - petshop_net

  backend:
    image: ${DOCKER_HUB_USERNAME}/petshop-backend:${IMAGE_TAG:-latest}
    container_name: petshop_backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - petshop_net

  reservation-worker:
    image: ${DOCKER_HUB_USERNAME}/petshop-backend:${IMAGE_TAG:-latest}
    container_name: petshop_reservation_worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    entrypoint: ["python", "-m", "app.workers.reservation_expiry"]
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - petshop_net

  frontend:
    image: ${DOCKER_HUB_USERNAME}/petshop-frontend:${IMAGE_TAG:-latest}
    container_name: petshop_frontend
    env_file: .env
    restart: unless-stopped
    networks:
      - petshop_net

  nginx:
    image: nginx:alpine
    container_name: petshop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - petshop_net

volumes:
  redis_data:

networks:
  petshop_net:
    driver: bridge
