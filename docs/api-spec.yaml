openapi: 3.0.0
info:
  title: ThePawsome API
  version: 1.0.0
  description: Tài liệu đặc tả API dành cho hệ thống Petshop E-commerce tích hợp trợ lý AI ThePawsome.
paths:
  /api/v1/auth/register:
    post:
      tags:
        - auth
      summary: Đăng ký tài khoản mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                full_name:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Đăng ký thành công
        '400':
          description: Email đã tồn tại hoặc dữ liệu không hợp lệ

  /api/v1/auth/login:
    post:
      tags:
        - auth
      summary: Đăng nhập hệ thống
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Đăng nhập thành công, trả về tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
        '401':
          description: Sai email hoặc mật khẩu

  /api/v1/auth/logout:
    post:
      tags:
        - auth
      summary: Đăng xuất tài khoản
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Đăng xuất thành công

  /api/v1/auth/refresh:
    post:
      tags:
        - auth
      summary: Làm mới access token bằng refresh token trong cookie
      responses:
        '200':
          description: Làm mới thành công, trả về access token mới
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string

  /api/v1/auth/me:
    get:
      tags:
        - auth
      summary: Lấy thông tin tài khoản hiện tại
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Trả về thông tin chi tiết của user

  /api/v1/products:
    get:
      tags:
        - products
      summary: Lấy danh sách sản phẩm (Hỗ trợ phân trang, lọc, tìm kiếm hybrid RAG)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Từ khóa tìm kiếm (Kích hoạt tìm kiếm Hybrid RRF nếu có)
        - name: category_slug
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: brand
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: min_price
          in: query
          required: false
          schema:
            type: number
        - name: max_price
          in: query
          required: false
          schema:
            type: number
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 12
        - name: keyword_only
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Danh sách sản phẩm được phân trang

  /api/v1/products/{slug}:
    get:
      tags:
        - products
      summary: Lấy thông tin chi tiết một sản phẩm bằng slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thông tin sản phẩm chi tiết cùng các biến thể sản phẩm

  /api/v1/products/{slug}/similar:
    get:
      tags:
        - products
      summary: Tìm sản phẩm tương tự bằng vector kết hợp trgm index
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 6
      responses:
        '200':
          description: Danh sách các sản phẩm tương tự

  /api/v1/cart:
    get:
      tags:
        - cart
      summary: Lấy giỏ hàng của người dùng hiện tại
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Giỏ hàng thành công

  /api/v1/cart/items:
    post:
      tags:
        - cart
      summary: Thêm sản phẩm hoặc biến thể vào giỏ hàng
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - quantity
              properties:
                product_id:
                  type: string
                  format: uuid
                variant_id:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Đã thêm vào giỏ hàng thành công

  /api/v1/cart/items/{item_id}:
    put:
      tags:
        - cart
      summary: Cập nhật số lượng mặt hàng trong giỏ
      security:
        - BearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Cập nhật thành công
    delete:
      tags:
        - cart
      summary: Xóa một mặt hàng khỏi giỏ hàng
      security:
        - BearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Xóa thành công

  /api/v1/orders/checkout:
    post:
      tags:
        - orders
      summary: Đặt hàng thanh toán (Khách đã đăng nhập)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ship_name
                - ship_phone
                - ship_address
                - payment_method
              properties:
                ship_name:
                  type: string
                ship_phone:
                  type: string
                ship_address:
                  type: string
                payment_method:
                  type: string
                  enum: [cod, sepay]
                product_coupon_code:
                  type: string
                shipping_coupon_code:
                  type: string
      responses:
        '200':
          description: Đặt hàng thành công, tạo đơn hàng mới

  /api/v1/orders/guest-checkout:
    post:
      tags:
        - orders
      summary: Đặt hàng thanh toán không cần đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - guest_email
                - ship_name
                - ship_phone
                - ship_address
                - payment_method
                - items
              properties:
                guest_email:
                  type: string
                  format: email
                ship_name:
                  type: string
                ship_phone:
                  type: string
                ship_address:
                  type: string
                payment_method:
                  type: string
                  enum: [cod, sepay]
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: string
                      variant_id:
                        type: string
                      quantity:
                        type: integer
      responses:
        '200':
          description: Đặt hàng thành công cho khách

  /api/v1/pets:
    get:
      tags:
        - pets
      summary: Lấy danh sách thú cưng của người dùng
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Trả về danh sách hồ sơ thú cưng
    post:
      tags:
        - pets
      summary: Thêm hồ sơ thú cưng mới
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - species
              properties:
                name:
                  type: string
                species:
                  type: string
                  enum: [dog, cat, other]
                breed:
                  type: string
                age_months:
                  type: integer
                weight_kg:
                  type: number
                gender:
                  type: string
                  enum: [male, female, unknown]
                health_notes:
                  type: string
                allergies:
                  type: string
      responses:
        '200':
          description: Thêm thú cưng thành công

  /api/v1/chat/stream:
    post:
      tags:
        - chat
      summary: Chat stream hội thoại với Catbot (Server-Sent Events)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                session_id:
                  type: string
                  format: uuid
                pet_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Kết nối SSE thành công để stream câu trả lời

  /api/v1/forum/threads:
    get:
      tags:
        - forum
      summary: Danh sách bài viết trên diễn đàn
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Trả về danh sách bài viết thảo luận

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
