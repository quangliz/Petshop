  <path d="M825 341 C980 285 1045 225 1180 215" class="rel" />
  <path d="M625 440 C755 380 1080 290 1180 220" class="rel" />

  <path d="M1140 210 L1180 210" class="rel" />
  <path d="M1285 255 L1285 305" class="rel" />
  <path d="M1285 255 C1270 330 1160 390 1160 430" class="rel" />
  <path d="M1285 255 C1285 340 1285 360 1285 430" class="rel" />

  <path d="M300 731 L340 731" class="rel" />
  <path d="M455 777 C490 805 535 805 545 777" class="rel" />
  <path d="M570 725 C610 710 615 725 640 725" class="concept" />
  <path d="M870 725 C900 725 910 725 940 725" class="concept" />
  <path d="M1160 725 L1190 725" class="rel" />

  <rect x="596" y="696" width="88" height="22" rx="5" class="label-bg" />
  <text x="640" y="711" text-anchor="middle" class="label">đã duyệt</text>
  <rect x="886" y="696" width="92" height="22" rx="5" class="label-bg" />
  <text x="932" y="711" text-anchor="middle" class="label">RAG context</text>
</svg>
