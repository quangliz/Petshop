<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1080" viewBox="0 0 1700 1080">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
    <style>
      .title { font: 700 30px "DejaVu Sans", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 13px "DejaVu Sans", Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px "DejaVu Sans", Arial, sans-serif; fill: #0f172a; }
      .node-title { font: 700 15px "DejaVu Sans", Arial, sans-serif; fill: #111827; }
      .node-text { font: 14px "DejaVu Sans", Arial, sans-serif; fill: #111827; }
      .small { font: 12px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .label { font: 13px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; }
      .client { fill: #dbeafe; stroke: #334155; stroke-width: 1.5; }
      .frontend { fill: #e0f2fe; stroke: #334155; stroke-width: 1.5; }
      .backend { fill: #dcfce7; stroke: #334155; stroke-width: 1.5; }
      .service { fill: #fef3c7; stroke: #334155; stroke-width: 1.5; }
      .data { fill: #fce7f3; stroke: #334155; stroke-width: 1.5; }
      .runtime { fill: #ffedd5; stroke: #334155; stroke-width: 1.5; }
      .external { fill: #ede9fe; stroke: #334155; stroke-width: 1.5; }
      .note { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 6 5; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1700" height="1080" fill="#ffffff" />
  <text x="850" y="42" text-anchor="middle" class="title">Kiến trúc tổng quan hệ thống ThePawsome</text>
  <text x="850" y="66" text-anchor="middle" class="subtitle">Monorepo tách frontend Next.js, backend FastAPI, data/runtime và dịch vụ ngoài</text>

  <g transform="translate(1040 76)">
    <rect x="0" y="0" width="575" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" />
    <rect x="14" y="10" width="20" height="14" class="client" />
    <text x="42" y="22" class="small">Client</text>
    <rect x="105" y="10" width="20" height="14" class="frontend" />
    <text x="133" y="22" class="small">Frontend</text>
    <rect x="225" y="10" width="20" height="14" class="backend" />
    <text x="253" y="22" class="small">Backend</text>
    <rect x="340" y="10" width="20" height="14" class="data" />
    <text x="368" y="22" class="small">Data</text>
    <rect x="425" y="10" width="20" height="14" class="external" />
    <text x="453" y="22" class="small">Dịch vụ ngoài</text>
  </g>

  <rect x="35" y="125" width="300" height="805" rx="12" class="lane" />
  <text x="58" y="158" class="section">Client</text>

  <rect x="365" y="125" width="350" height="805" rx="12" class="lane" />
  <text x="388" y="158" class="section">Frontend: Next.js</text>

  <rect x="745" y="125" width="430" height="805" rx="12" class="lane" />
  <text x="768" y="158" class="section">Backend: FastAPI</text>

  <rect x="1205" y="125" width="460" height="430" rx="12" class="lane" />
  <text x="1228" y="158" class="section">Data và runtime</text>

  <rect x="1205" y="585" width="460" height="345" rx="12" class="lane" />
  <text x="1228" y="618" class="section">Dịch vụ ngoài</text>

  <rect x="35" y="955" width="1630" height="80" rx="12" class="lane" />
  <text x="58" y="987" class="section">Triển khai và vận hành</text>

  <!-- Client lane -->
  <g>
    <rect x="80" y="210" width="210" height="76" rx="10" class="client" />
    <text x="185" y="237" text-anchor="middle" class="node-title">Trình duyệt</text>
    <text x="185" y="260" text-anchor="middle" class="node-text">Khách hàng, admin, expert</text>
  </g>

  <g>
    <rect x="80" y="360" width="210" height="86" rx="10" class="client" />
    <text x="185" y="388" text-anchor="middle" class="node-title">HTTP / HTTPS</text>
    <text x="185" y="411" text-anchor="middle" class="node-text">
      <tspan x="185" dy="0">Trang web, REST API</tspan>
      <tspan x="185" dy="19">và SSE Catbot</tspan>
    </text>
  </g>

  <g>
    <rect x="80" y="640" width="210" height="86" rx="10" class="client" />
    <text x="185" y="668" text-anchor="middle" class="node-title">Thanh toán</text>
    <text x="185" y="691" text-anchor="middle" class="node-text">
      <tspan x="185" dy="0">Quét VietQR</tspan>
      <tspan x="185" dy="19">bằng ứng dụng ngân hàng</tspan>
    </text>
  </g>

  <!-- Frontend lane -->
  <g>
    <rect x="405" y="180" width="270" height="92" rx="10" class="frontend" />
    <text x="540" y="208" text-anchor="middle" class="node-title">Next.js App Router</text>
    <text x="540" y="231" text-anchor="middle" class="node-text">
      <tspan x="540" dy="0">(shop), (auth), admin</tspan>
      <tspan x="540" dy="19">SSR/CSR theo route</tspan>
    </text>
  </g>

  <g>
    <rect x="405" y="320" width="270" height="92" rx="10" class="frontend" />
    <text x="540" y="348" text-anchor="middle" class="node-title">UI components</text>
    <text x="540" y="371" text-anchor="middle" class="node-text">
      <tspan x="540" dy="0">Header, shop, checkout,</tspan>
      <tspan x="540" dy="19">admin, forum, ChatWidget</tspan>
    </text>
  </g>

  <g>
    <rect x="405" y="460" width="270" height="92" rx="10" class="frontend" />
    <text x="540" y="488" text-anchor="middle" class="node-title">State và API client</text>
    <text x="540" y="511" text-anchor="middle" class="node-text">
      <tspan x="540" dy="0">TanStack Query, Zustand</tspan>
      <tspan x="540" dy="19">axios + token refresh</tspan>
    </text>
  </g>

  <g>
    <rect x="405" y="640" width="270" height="86" rx="10" class="frontend" />
    <text x="540" y="665" text-anchor="middle" class="node-title">SePay page</text>
    <text x="540" y="688" text-anchor="middle" class="node-text">
      <tspan x="540" dy="0">Hiển thị VietQR</tspan>
      <tspan x="540" dy="19">polling trạng thái thanh toán</tspan>
    </text>
  </g>

  <!-- Backend lane -->
  <g>
    <rect x="790" y="170" width="340" height="92" rx="10" class="backend" />
    <text x="960" y="198" text-anchor="middle" class="node-title">FastAPI application</text>
    <text x="960" y="221" text-anchor="middle" class="node-text">
      <tspan x="960" dy="0">CORS, request id, logging,</tspan>
      <tspan x="960" dy="19">security headers, rate limit</tspan>
    </text>
  </g>

  <g>
    <rect x="790" y="305" width="340" height="105" rx="10" class="backend" />
    <text x="960" y="333" text-anchor="middle" class="node-title">API routers</text>
    <text x="960" y="356" text-anchor="middle" class="node-text">
      <tspan x="960" dy="0">auth, products, cart, orders,</tspan>
      <tspan x="960" dy="19">payments, pets, chat, forum,</tspan>
      <tspan x="960" dy="19">reviews, admin, observability</tspan>
    </text>
  </g>

  <g>
    <rect x="790" y="455" width="340" height="92" rx="10" class="backend" />
    <text x="960" y="483" text-anchor="middle" class="node-title">Dependencies</text>
    <text x="960" y="506" text-anchor="middle" class="node-text">
      <tspan x="960" dy="0">AsyncSession, JWT auth,</tspan>
      <tspan x="960" dy="19">optional user, admin/support role</tspan>
    </text>
  </g>

  <g>
    <rect x="790" y="595" width="340" height="118" rx="10" class="service" />
    <text x="960" y="624" text-anchor="middle" class="node-title">Services nghiệp vụ</text>
    <text x="960" y="647" text-anchor="middle" class="node-text">
      <tspan x="960" dy="0">checkout/inventory, SePay,</tspan>
      <tspan x="960" dy="19">RAG retrieval/indexing,</tspan>
      <tspan x="960" dy="19">AI safety, forum knowledge, audit</tspan>
    </text>
  </g>

  <g>
    <rect x="790" y="770" width="340" height="92" rx="10" class="runtime" />
    <text x="960" y="798" text-anchor="middle" class="node-title">Worker nền</text>
    <text x="960" y="821" text-anchor="middle" class="node-text">
      <tspan x="960" dy="0">reservation_expiry</tspan>
      <tspan x="960" dy="19">quét reservation quá hạn</tspan>
    </text>
  </g>

  <!-- Data lane -->
  <g>
    <rect x="1250" y="185" width="360" height="96" rx="10" class="data" />
    <text x="1430" y="213" text-anchor="middle" class="node-title">PostgreSQL + SQLAlchemy</text>
    <text x="1430" y="236" text-anchor="middle" class="node-text">
      <tspan x="1430" dy="0">28 bảng nghiệp vụ: user, catalog,</tspan>
      <tspan x="1430" dy="19">commerce, forum, chat, knowledge...</tspan>
    </text>
  </g>

  <g>
    <rect x="1250" y="320" width="360" height="82" rx="10" class="data" />
    <text x="1430" y="348" text-anchor="middle" class="node-title">PGVector trong PostgreSQL</text>
    <text x="1430" y="371" text-anchor="middle" class="node-text">
      <tspan x="1430" dy="0">petshop_products, petshop_knowledge</tspan>
    </text>
  </g>

  <g>
    <rect x="1250" y="435" width="360" height="82" rx="10" class="runtime" />
    <text x="1430" y="463" text-anchor="middle" class="node-title">Redis</text>
    <text x="1430" y="486" text-anchor="middle" class="node-text">
      <tspan x="1430" dy="0">rate limit, cache embedding,</tspan>
      <tspan x="1430" dy="19">cache hồ sơ thú cưng</tspan>
    </text>
  </g>

  <!-- External services lane -->
  <g>
    <rect x="1250" y="650" width="360" height="78" rx="10" class="external" />
    <text x="1430" y="678" text-anchor="middle" class="node-title">OpenAI / Cohere</text>
    <text x="1430" y="701" text-anchor="middle" class="node-text">Chat model, embedding, rerank tùy chọn</text>
  </g>

  <g>
    <rect x="1250" y="760" width="360" height="78" rx="10" class="external" />
    <text x="1430" y="788" text-anchor="middle" class="node-title">SePay VietQR</text>
    <text x="1430" y="811" text-anchor="middle" class="node-text">QR chuyển khoản và webhook thanh toán</text>
  </g>

  <g>
    <rect x="1250" y="865" width="170" height="50" rx="10" class="external" />
    <text x="1335" y="896" text-anchor="middle" class="node-title">Cloudinary</text>
  </g>

  <g>
    <rect x="1440" y="865" width="170" height="50" rx="10" class="external" />
    <text x="1525" y="885" text-anchor="middle" class="node-title">Google OAuth</text>
    <text x="1525" y="904" text-anchor="middle" class="small">+ SMTP email</text>
  </g>

  <!-- Deployment lane -->
  <g>
    <rect x="360" y="975" width="300" height="42" rx="10" class="note" />
    <text x="510" y="1001" text-anchor="middle" class="node-title">Local: Docker Compose postgres/redis</text>
  </g>

  <g>
    <rect x="710" y="975" width="300" height="42" rx="10" class="note" />
    <text x="860" y="1001" text-anchor="middle" class="node-title">Alembic migration + health checks</text>
  </g>

  <g>
    <rect x="1060" y="975" width="300" height="42" rx="10" class="note" />
    <text x="1210" y="1001" text-anchor="middle" class="node-title">Production: EC2 app + RDS PostgreSQL</text>
  </g>

  <!-- Edges -->
  <path class="arrow" d="M185 286 V360" />
  <path class="arrow" d="M290 403 H405" />
  <text x="310" y="389" class="label">HTTP</text>

  <path class="arrow" d="M540 272 V320" />
  <path class="arrow" d="M540 412 V460" />
  <path class="arrow" d="M675 506 H790" />
  <text x="700" y="492" class="label">REST / SSE</text>

  <path class="arrow" d="M960 262 V305" />
  <path class="arrow" d="M960 410 V455" />
  <path class="arrow" d="M960 547 V595" />

  <path class="arrow" d="M1130 640 H1215 V233 H1250" />
  <text x="1160" y="222" class="label">ORM / transaction</text>

  <path class="arrow" d="M1130 670 H1215 V361 H1250" />
  <text x="1160" y="350" class="label">vector search</text>

  <path class="arrow" d="M1130 690 H1215 V476 H1250" />
  <text x="1160" y="465" class="label">cache / rate limit</text>

  <path class="arrow" d="M1130 625 H1215 V689 H1250" />
  <path class="arrow" d="M1130 660 H1215 V799 H1250" />
  <path class="arrow dashed" d="M1250 799 H1180 V357 H1130" />
  <text x="1160" y="775" class="label">webhook</text>

  <path class="arrow" d="M675 683 H790" />
  <path class="arrow dashed" d="M1130 816 H1215 V250 H1250" />
  <text x="1160" y="805" class="label">release stock</text>

  <path class="arrow dashed" d="M1430 402 V435" />
  <text x="1448" y="424" class="label">cache hỗ trợ</text>
</svg>
