version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: petshop_db
    environment:
      POSTGRES_USER: petshop_user
      POSTGRES_PASSWORD: petshop_password
      POSTGRES_DB: petshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: petshop_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
